<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistent</title>
<style>
body{margin:0;font-family:Arial;display:flex;flex-direction:column;height:100vh;background:#202123;color:white;}
header{display:flex;justify-content:space-between;padding:15px;background:#343541;font-weight:bold;}
#chat{flex:1;padding:20px;overflow:auto;}
.msg{max-width:70%;padding:12px;border-radius:10px;margin:10px 0;}
.user{background:#10a37f;margin-left:auto;color:white;}
.ai{background:#444654;}
#inputArea{display:flex;padding:10px;background:#343541;}
#input{flex:1;padding:12px;border:none;border-radius:8px;}
button{margin-left:5px;padding:10px;border:none;border-radius:8px;cursor:pointer;}
img{max-width:300px;margin-top:10px;border-radius:10px;}
.light{background:#f1f5f9;color:black;}
footer{padding:10px;font-size:12px;text-align:center;opacity:0.7;}
</style>
</head>
<body>

<header>
<span>AI Assistent</span>
<button onclick="toggleMode()">🌙</button>
</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask AI Assistent...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
<button onclick="generateImage()">🎨</button>
</div>

<footer>This AI was created by Liamz</footer>

<script>
// Chat box reference
const chat = document.getElementById("chat");

// Add message to chat
function addMsg(text,type){
    const div = document.createElement("div");
    div.className="msg "+type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Send message to AI
async function send(){
    const input = document.getElementById("input");
    const text = input.value;
    if(!text) return;
    addMsg(text,"user");
    input.value="";
    addMsg("Thinking...","ai");

    // Simpel dummy AI logic
    if(text.toLowerCase() === "hello ai"){
        chat.lastChild.remove();
        addMsg("Hello Captain Liamz","ai");
        speak("Hello Captain Liamz");
        return;
    }

    // Kalau mau pakai OpenAI API, ganti bagian ini dengan fetch ke backend
    setTimeout(()=>{
        chat.lastChild.remove();
        addMsg("Sorry, AI backend belum disambungkan. Ini cuma demo.","ai");
        speak("Sorry, AI backend belum disambungkan. Ini cuma demo.");
    },1000);
}

// Voice input
function voice(){
    const rec = new webkitSpeechRecognition();
    rec.lang="en-US";
    rec.onresult = e => { document.getElementById("input").value = e.results[0][0].transcript; };
    rec.start();
}

// AI voice output
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}

// Generate image
function generateImage(){
    const prompt = prompt("Describe image");
    if(!prompt) return;
    const url = "https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);
    const img = document.createElement("img");
    img.src = url;
    chat.appendChild(img);
}

// Toggle dark/light mode
function toggleMode(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
